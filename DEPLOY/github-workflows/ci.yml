name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-syntax:
    name: Python syntax + lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyflakes

      - name: Compile-check all Python files
        run: |
          python -m compileall -q ShrutiMusic strings config.py

      - name: Pyflakes (unused imports / undefined names)
        run: pyflakes ShrutiMusic strings config.py || true

      - name: Ruff (style + bugs)
        run: ruff check ShrutiMusic strings config.py --select=E,F,W --ignore=E501,F401,F403,F405 || true

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: aradhyemusic:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
