version: "3.9"

# AradhyeMusic — Telegram Voice Chat Music Bot
# Quick start:
#   1. Copy .env.example → .env and fill values
#   2. docker compose up -d --build
#   3. docker compose logs -f aradhyemusic

services:
  aradhyemusic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aradhyemusic
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - ./cache:/app/cache
      - ./logs:/app/logs
    depends_on:
      - mongo
    networks:
      - aradhye-net

  mongo:
    image: mongo:7
    container_name: aradhye-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - aradhye-net
    # Uncomment to expose locally:
    # ports:
    #   - "27017:27017"

networks:
  aradhye-net:
    driver: bridge

volumes:
  mongo-data:
